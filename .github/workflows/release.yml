name: Release to AWS Marketplace

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version to build/push (no leading v)"
        required: true

env:
  MP_AWS_ECR: 709825985650.dkr.ecr.us-east-1.amazonaws.com

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            echo "value=${{ github.event.inputs.release_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.MP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.MP_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "${{ env.MP_AWS_ECR }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bedrock AgentCore Runtime requires ARM64 images specifically (confirmed
      # via a real ValidationException, not docs) -- ubuntu-latest runners are
      # x86_64, so this cross-builds via QEMU emulation rather than assuming a
      # native ARM64 runner is available.
      # provenance/sbom disabled: Buildx attaches these as extra attestation
      # manifests by default, turning the push into a multi-manifest OCI
      # image index. AWS Marketplace's scanner can't read that shape and
      # rejects the image with "UnsupportedImageType" -- confirmed by a real
      # failure after switching from plain `docker build`/`docker push` to
      # this action. Plain single-manifest push is what Marketplace expects.
      - name: Build and push image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.MP_AWS_ECR }}/solodev/openapi-mcp:${{ steps.version.outputs.value }}

      - name: Prepare Marketplace changeset
        run: |
          cp devops/changeset.sh.dst devops/changeset.sh
          sed -i "s/{RELEASE_VERSION}/${{ steps.version.outputs.value }}/g" devops/changeset.sh

      - name: Submit AWS Marketplace changeset
        run: bash devops/changeset.sh

  package-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            echo "value=${{ github.event.inputs.release_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Same shape as the AMI's own npm ci --omit=dev: this is a prebuilt
      # artifact, not a source checkout, so node_modules ships in the zip and
      # the AMI build never runs npm (or git) against this repo at all.
      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Build release archive
        run: zip -q -r openapi-mcp.zip package.json package-lock.json src node_modules

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload release archive to S3
        run: |
          aws s3 cp openapi-mcp.zip "s3://openapi-mcp/openapi-mcp-${{ steps.version.outputs.value }}.zip"
          aws s3 cp openapi-mcp.zip "s3://openapi-mcp/openapi-mcp-latest.zip"
